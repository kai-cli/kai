# DevTeam Credential Requirements
#
# This file declares the credentials that DevTeam needs for full functionality.
# Missing required credentials will block execution; missing optional credentials
# will trigger graceful degradation (e.g., falling back to Claude adversarial review
# instead of Bedrock multi-model review).

credentials:
  - name: AWS_PROFILE
    required: false
    description: AWS profile for Bedrock multi-model review (falls back to Claude adversarial if missing)
    check: aws sts get-caller-identity

  - name: GITHUB_TOKEN
    required: false
    description: GitHub API access for PR operations (falls back to gh CLI auth if missing)
