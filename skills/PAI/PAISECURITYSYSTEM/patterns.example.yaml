# PAI Security Patterns
# Loaded by SecurityValidator.hook.ts at runtime.
#
# Path priority:
#   1. PAI/USER/PAISECURITYSYSTEM/patterns.yaml (your custom rules — this file after install)
#   2. skills/PAI/PAISECURITYSYSTEM/patterns.example.yaml (system fallback)
#
# Path patterns support: ~ (home), * (single segment), ** (recursive), prefix match (trailing /)
# Bash patterns are regex (case-insensitive).
#
# Containment zones:
#   personal = readOnly (TELOS, RELATIONSHIP, SIGNALS — your private context)
#   system   = confirmWrite (settings.json, identity.jsonc — breaks things if wrong)
#   shared   = normal access (KNOWLEDGE, hooks, skills, config)
#   secrets  = zeroAccess (SSH keys, credentials — never touched)
---
version: "5.5.0"
last_updated: "2026-05-15"

philosophy:
  mode: defensive
  principle: "Personal data stays personal. System config requires confirmation. Destructive commands require intent."

# ========================================
# BASH COMMAND PATTERNS
# ========================================
bash:
  # TRUSTED - Fast-path allow (no logging, no checks)
  trusted:
    - pattern: "^(git (status|log|diff|branch|show|rev-parse|remote -v)|bun test|bun run |ls |cat |head |tail |wc |grep |rg |find )"
      reason: "Read-only git, test, and inspection commands"
    - pattern: "^(echo|printf|date|pwd|which|type|file |stat )"
      reason: "Pure information commands"

  # BLOCKED - Catastrophic/irreversible (exit 2)
  blocked:
    # Filesystem destruction
    - pattern: "rm\\s+(-rf?\\s+)?(/|~/?$|~/.claude/?$)"
      reason: "Recursive delete of root, home, or PAI root"
    - pattern: "rm\\s+-rf?\\s+~/.claude/(hooks|config|PAI|MEMORY)/?$"
      reason: "Bulk delete of critical PAI directories"
    - pattern: "sudo rm -rf /"
      reason: "Filesystem destruction with sudo"
    - pattern: "sudo rm -rf ~"
      reason: "Home directory destruction with sudo"

    # Disk operations
    - pattern: "diskutil eraseDisk"
      reason: "Disk destruction"
    - pattern: "diskutil zeroDisk"
      reason: "Disk destruction"
    - pattern: "diskutil partitionDisk"
      reason: "Disk partitioning"
    - pattern: "diskutil apfs deleteContainer"
      reason: "APFS container deletion"
    - pattern: "diskutil apfs eraseVolume"
      reason: "Volume destruction"
    - pattern: "dd\\s+.*of=/dev/"
      reason: "Raw disk write"
    - pattern: "mkfs\\."
      reason: "Filesystem format"

    # Repository operations
    - pattern: "gh repo delete"
      reason: "Repository deletion"
    - pattern: "gh repo edit --visibility public"
      reason: "Repository exposure"

    # PAI-specific
    - pattern: ">(\\s+)?~/.claude/settings\\.json"
      reason: "Redirect overwrite of settings.json (use BuildSettings.ts)"
    - pattern: "chmod\\s+777"
      reason: "World-writable permissions"
    - pattern: "curl.*\\|\\s*(bash|sh|zsh)"
      reason: "Pipe from internet to shell"
    - pattern: "git\\s+push\\s+.*--force.*\\s+(main|master)"
      reason: "Force push to main/master"

  # CONFIRM - Dangerous but sometimes legitimate
  confirm:
    # Git operations
    - pattern: "git\\s+push"
      reason: "Pushing to remote requires confirmation"
    - pattern: "git\\s+reset\\s+--hard"
      reason: "Hard reset discards uncommitted work"

    # Destructive file operations
    - pattern: "rm\\s+-r"
      reason: "Recursive delete requires confirmation"

    # Cloud operations
    - pattern: "aws s3 rm.*--recursive"
      reason: "Bulk S3 deletion"
    - pattern: "aws ec2 terminate"
      reason: "EC2 instance termination"
    - pattern: "aws rds delete"
      reason: "RDS deletion"
    - pattern: "gcloud.*delete"
      reason: "GCP resource deletion"
    - pattern: "terraform destroy"
      reason: "Infrastructure destruction"
    - pattern: "terraform apply.*-auto-approve"
      reason: "Auto-approve bypasses review"

    # Containers
    - pattern: "docker system prune"
      reason: "Container/image cleanup"
    - pattern: "kubectl delete namespace"
      reason: "Namespace deletion"

    # Databases
    - pattern: "DROP DATABASE"
      reason: "Database destruction"
    - pattern: "DROP TABLE"
      reason: "Table destruction"
    - pattern: "TRUNCATE"
      reason: "Table data destruction"

    # Publishing
    - pattern: "npm\\s+publish|bun\\s+publish"
      reason: "Publishing packages requires confirmation"

  # ALERT - Suspicious but allowed (logged, not blocked)
  alert:
    - pattern: "curl.*-d|curl.*--data|wget"
      reason: "Outbound data transfer (logged for awareness)"

# ========================================
# PATH PROTECTION (Containment Zones)
# ========================================
paths:
  # ZERO ACCESS — secrets and credentials (never read or write)
  zeroAccess:
    - "~/.ssh/id_*"
    - "~/.ssh/*.pem"
    - "~/.ssh/authorized_keys"
    - "~/.aws/credentials"
    - "~/.gnupg/private*"
    - "~/.netrc"
    - "~/.claude/settings.local.json"

  # READ ONLY — personal zone (can read for context, cannot modify)
  # These contain your identity, relationships, and private signals.
  # The AI can read them to understand you, but should never rewrite them.
  readOnly:
    - "~/.claude/PAI/USER/TELOS/"
    - "~/.claude/MEMORY/RELATIONSHIP/"
    - "~/.claude/MEMORY/LEARNING/SIGNALS/"

  # CONFIRM WRITE — system-critical files (one wrong edit breaks everything)
  confirmWrite:
    - "~/.claude/settings.json"
    - "~/.claude/config/identity.jsonc"
    - "~/.claude/config/hooks.jsonc"
    - "~/.claude/config/permissions.jsonc"
    - "~/.claude/PAI/USER/PAISECURITYSYSTEM/patterns.yaml"
    - "**/.env"
    - "**/.env.*"

  # NO DELETE — knowledge and core infrastructure (can modify, cannot destroy)
  noDelete:
    - "~/.claude/MEMORY/KNOWLEDGE/"
    - "~/.claude/MEMORY/WISDOM/"
    - "~/.claude/PAI/Algorithm/"
    - "~/.claude/hooks/lib/"
    - "~/.claude/config/"
    - ".git/**"
    - "LICENSE*"

# ========================================
# PROJECT-SPECIFIC RULES
# ========================================
# Add per-project overrides here. Example:
# projects:
#   production-api:
#     path: "~/Projects/prod-api"
#     rules:
#       - action: "block_git_push"
#         reason: "Deploy via CI only — never push directly"
projects: {}
