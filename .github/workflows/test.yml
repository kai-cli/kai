name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile
      - run: PAI_DIR=$PWD bun test

  smoke:
    name: Config-Layer Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Verify CLAUDE.md or template exists
        run: |
          if test -f CLAUDE.md; then
            head -1 CLAUDE.md | grep -q "^# " || { echo "FAIL: CLAUDE.md missing header"; exit 1; }
          elif test -f CLAUDE.md.template; then
            head -1 CLAUDE.md.template | grep -q "^# " || { echo "FAIL: CLAUDE.md.template missing header"; exit 1; }
          else
            echo "FAIL: neither CLAUDE.md nor CLAUDE.md.template found"; exit 1
          fi

      - name: Verify hook runner is executable
        run: |
          test -x hooks/lib/run-hook.sh || { echo "FAIL: run-hook.sh not executable"; exit 1; }

      - name: Bootstrap identity config if template-only
        run: |
          if [ ! -f config/identity.jsonc ] && [ -f config/identity.jsonc.template ]; then
            cp config/identity.jsonc.template config/identity.jsonc
          fi

      - name: Verify BuildSettings runs
        run: PAI_DIR=$PWD bun hooks/handlers/BuildSettings.ts

      - name: Verify manifest counts
        run: |
          if test -f manifest.json; then
            M_SKILLS=$(grep -oE '"skills":\s*[0-9]+' manifest.json | grep -oE '[0-9]+')
            M_HOOKS=$(grep -oE '"hooks":\s*[0-9]+' manifest.json | grep -oE '[0-9]+')
            M_AGENTS=$(grep -oE '"agents":\s*[0-9]+' manifest.json | grep -oE '[0-9]+')
            F_SKILLS=$(find skills -name SKILL.md | wc -l | tr -d ' ')
            F_HOOKS=$(find hooks -maxdepth 1 -name '*.hook.ts' | wc -l | tr -d ' ')
            F_AGENTS=$(find agents -maxdepth 1 -name '*.md' ! -name 'README.md' | wc -l | tr -d ' ')
            echo "Manifest: $M_SKILLS skills, $M_HOOKS hooks, $M_AGENTS agents"
            echo "Filesystem: $F_SKILLS skills, $F_HOOKS hooks, $F_AGENTS agents"
            test "$M_SKILLS" = "$F_SKILLS" || { echo "FAIL: skills mismatch"; exit 1; }
            test "$M_HOOKS" = "$F_HOOKS" || { echo "FAIL: hooks mismatch"; exit 1; }
            test "$M_AGENTS" = "$F_AGENTS" || { echo "FAIL: agents mismatch"; exit 1; }
            echo "PASS: manifest counts match"
          else
            echo "SKIP: no manifest.json"
          fi

      - name: Verify skill inventory
        run: |
          SKILL_COUNT=$(find skills -maxdepth 2 -name SKILL.md | wc -l | tr -d ' ')
          echo "Found $SKILL_COUNT skills"
          test "$SKILL_COUNT" -gt 0 || { echo "FAIL: no skills found"; exit 1; }

      - name: Verify hook inventory
        run: |
          HOOK_COUNT=$(find hooks -maxdepth 1 -name '*.hook.ts' | wc -l | tr -d ' ')
          echo "Found $HOOK_COUNT hooks"
          test "$HOOK_COUNT" -gt 0 || { echo "FAIL: no hooks found"; exit 1; }
