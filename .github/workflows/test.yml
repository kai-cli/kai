name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Run tests
        run: bun test

  verify:
    name: Release Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Run verify-release.sh
        run: bash scripts/verify-release.sh

  smoke:
    name: Config-Layer Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Verify CLAUDE.md.template exists with product variable
        run: |
          test -f CLAUDE.md.template || { echo "FAIL: CLAUDE.md.template not found"; exit 1; }
          head -1 CLAUDE.md.template | grep -q 'PRODUCT_NAME' || { echo "FAIL: template missing PRODUCT_NAME variable"; exit 1; }

      - name: Verify hook runner is executable
        run: |
          test -x hooks/lib/run-hook.sh || { echo "FAIL: run-hook.sh not executable"; exit 1; }

      - name: Bootstrap identity config if template-only
        run: |
          if [ ! -f config/identity.jsonc ] && [ -f config/identity.jsonc.template ]; then
            cp config/identity.jsonc.template config/identity.jsonc
          fi

      - name: Verify BuildSettings runs
        run: PAI_DIR=$PWD bun hooks/handlers/BuildSettings.ts

      - name: Verify skill inventory matches filesystem
        run: |
          SKILL_COUNT=$(find skills -maxdepth 2 -name SKILL.md | wc -l | tr -d ' ')
          echo "Found $SKILL_COUNT skills"
          test "$SKILL_COUNT" -gt 0 || { echo "FAIL: no skills found"; exit 1; }

      - name: Verify hook inventory matches filesystem
        run: |
          HOOK_COUNT=$(find hooks -maxdepth 1 -name '*.hook.ts' | wc -l | tr -d ' ')
          echo "Found $HOOK_COUNT hooks"
          test "$HOOK_COUNT" -gt 0 || { echo "FAIL: no hooks found"; exit 1; }

      - name: Verify manifest counts match filesystem
        run: |
          if test -f manifest.json; then
            M_SKILLS=$(grep -oE '"skills":\s*[0-9]+' manifest.json | grep -oE '[0-9]+')
            M_HOOKS=$(grep -oE '"hooks":\s*[0-9]+' manifest.json | grep -oE '[0-9]+')
            M_AGENTS=$(grep -oE '"agents":\s*[0-9]+' manifest.json | grep -oE '[0-9]+')
            F_SKILLS=$(find skills -maxdepth 2 -name SKILL.md | wc -l | tr -d ' ')
            F_HOOKS=$(find hooks -maxdepth 1 -name '*.hook.ts' | wc -l | tr -d ' ')
            F_AGENTS=$(find agents -maxdepth 1 -name '*.md' | wc -l | tr -d ' ')
            echo "Manifest: $M_SKILLS skills, $M_HOOKS hooks, $M_AGENTS agents"
            echo "Filesystem: $F_SKILLS skills, $F_HOOKS hooks, $F_AGENTS agents"
            test "$M_SKILLS" = "$F_SKILLS" || { echo "FAIL: manifest skills ($M_SKILLS) != filesystem ($F_SKILLS)"; exit 1; }
            test "$M_HOOKS" = "$F_HOOKS" || { echo "FAIL: manifest hooks ($M_HOOKS) != filesystem ($F_HOOKS)"; exit 1; }
            test "$M_AGENTS" = "$F_AGENTS" || { echo "FAIL: manifest agents ($M_AGENTS) != filesystem ($F_AGENTS)"; exit 1; }
            echo "PASS: manifest counts match filesystem"
          else
            echo "SKIP: no manifest.json"
          fi
