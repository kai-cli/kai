<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAI Board</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Mono', 'Fira Code', monospace;
    background: #0d1117; color: #c9d1d9; min-height: 100vh;
  }

  /* --- Header --- */
  header {
    padding: 12px 20px; border-bottom: 1px solid #21262d;
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  header h1 { font-size: 16px; font-weight: 600; color: #58a6ff; white-space: nowrap; }
  .header-stats { font-size: 12px; color: #8b949e; white-space: nowrap; }
  .header-actions { margin-left: auto; display: flex; gap: 8px; align-items: center; }
  .search-box {
    background: #161b22; border: 1px solid #30363d; border-radius: 6px;
    padding: 5px 10px; color: #c9d1d9; font-size: 12px; width: 200px;
    font-family: inherit; outline: none;
  }
  .search-box:focus { border-color: #58a6ff; }
  .btn {
    padding: 5px 12px; border-radius: 6px; border: 1px solid #30363d;
    background: #21262d; color: #c9d1d9; font-size: 12px; cursor: pointer;
    font-family: inherit; white-space: nowrap; transition: all 0.15s;
  }
  .btn:hover { background: #30363d; border-color: #8b949e; }
  .btn-primary { background: #1f6feb; border-color: #1f6feb; color: #fff; }
  .btn-primary:hover { background: #388bfd; }
  .btn-sm { padding: 3px 8px; font-size: 11px; }

  /* --- Dashboard Layout --- */
  .dashboard {
    display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
    padding: 16px 20px; height: calc(100vh - 56px); overflow-y: auto;
    align-content: start;
  }
  @media (max-width: 900px) { .dashboard { grid-template-columns: 1fr; } }

  .panel { display: flex; flex-direction: column; gap: 4px; }
  .panel-title {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.5px; color: #484f58; padding: 0 4px 8px;
  }

  /* --- Sections --- */
  .section {
    border: 1px solid #21262d; border-radius: 8px; overflow: hidden;
    margin-bottom: 8px;
  }
  .section-header {
    padding: 8px 12px; font-size: 12px; font-weight: 600;
    display: flex; align-items: center; gap: 8px; cursor: pointer;
    user-select: none; transition: background 0.1s;
  }
  .section-header:hover { background: #161b22; }
  .section-header .arrow { font-size: 10px; color: #484f58; width: 12px; }
  .section-header .count {
    background: rgba(255,255,255,0.08); padding: 1px 6px;
    border-radius: 8px; font-size: 10px; font-weight: 400; color: #8b949e;
  }
  .section-body { display: flex; flex-direction: column; gap: 4px; padding: 4px 8px 8px; }
  .section.collapsed .section-body { display: none; }

  /* Section colors */
  .sec-sessions .section-header { background: #0d1f0d; color: #4ade80; }
  .sec-progress .section-header { background: #0d1f3c; color: #58a6ff; }
  .sec-backlog .section-header { background: #161b22; color: #8b949e; }
  .sec-prs .section-header { background: #0d1f0d; color: #7ee787; }
  .sec-issues .section-header { background: #161b22; color: #d29922; }
  .sec-done .section-header { background: #0d2818; color: #3fb950; }
  .sec-library .section-header { background: #1a1a2e; color: #a78bfa; }

  /* --- Cards --- */
  .card {
    background: #161b22; border: 1px solid #21262d; border-radius: 6px;
    padding: 10px; transition: border-color 0.15s; cursor: pointer;
  }
  .card:hover { border-color: #58a6ff; }
  .card-title {
    font-size: 12px; font-weight: 500; color: #e6edf3;
    margin-bottom: 4px; line-height: 1.3;
  }
  .card-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .badge {
    font-size: 9px; padding: 1px 5px; border-radius: 3px;
    font-weight: 500; text-transform: uppercase; letter-spacing: 0.3px;
  }
  .badge-effort { background: #1e3a5f; color: #58a6ff; }
  .badge-phase { background: #21262d; color: #8b949e; }
  .badge-active { background: #1a3d1a; color: #4ade80; }
  .badge-repo { background: #1a2d1a; color: #7ee787; }
  .badge-label { background: #2d2305; color: #d29922; }
  .badge-pr { background: #0d2818; color: #3fb950; }
  .badge-issue { background: #2d1f00; color: #d29922; }
  .badge-watching { background: #21262d; color: #8b949e; }
  .badge-stale { background: #3b1f1f; color: #f87171; }
  .badge-aging { background: #3b351f; color: #fbbf24; }
  .repo-group { margin-bottom: 4px; }
  .repo-group-header {
    font-size: 10px; color: #7ee787; padding: 4px 8px; font-weight: 600;
    cursor: pointer; display: flex; align-items: center; gap: 4px;
  }
  .repo-group-header:hover { color: #4ade80; }
  .repo-group-header .arrow { font-size: 9px; color: #484f58; }
  .progress-bar { height: 3px; background: #21262d; border-radius: 2px; overflow: hidden; margin: 4px 0 2px; }
  .progress-fill { height: 100%; border-radius: 2px; background: #58a6ff; }
  .card-time { font-size: 10px; color: #484f58; margin-top: 3px; }
  .session-duration { font-size: 10px; color: #8b949e; }
  .session-duration.active { color: #4ade80; }
  .exit-badge { font-size: 9px; padding: 1px 5px; border-radius: 3px; font-weight: 500; }
  .exit-completed { background: #0d2818; color: #3fb950; }
  .exit-abandoned { background: #21262d; color: #8b949e; }
  .exit-crashed { background: #3b1f1f; color: #f87171; }
  .exit-timeout { background: #2d2305; color: #d29922; }

  /* Events timeline */
  .timeline { margin-top: 8px; padding-top: 8px; border-top: 1px solid #21262d; }
  .timeline-label { font-size: 10px; color: #484f58; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.4px; }
  .timeline-bar { position: relative; height: 8px; background: #21262d; border-radius: 4px; overflow: visible; margin-bottom: 4px; }
  .timeline-segment { position: absolute; height: 100%; border-radius: 2px; cursor: default; transition: opacity 0.1s; }
  .timeline-segment:hover { opacity: 0.75; }
  .timeline-events { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
  .timeline-event { font-size: 9px; color: #484f58; padding: 1px 5px; background: #161b22; border-radius: 3px; border: 1px solid #21262d; }

  /* Session card active */
  .card-session { background: #1c2b1c; border-color: #2d4a2d; }
  .card-session:hover { border-color: #4ade80; }

  /* Library card */
  .card-library { border-color: #1a1a2e; }
  .card-library:hover { border-color: #a78bfa; }
  .card-library .card-title { color: #a78bfa; }
  .card-desc { font-size: 11px; color: #8b949e; margin-bottom: 4px; line-height: 1.3; }

  /* Expanded card */
  .card-expanded { border-color: #58a6ff; }
  .card-actions {
    display: flex; gap: 6px; margin-top: 8px; padding-top: 8px;
    border-top: 1px solid #21262d; flex-wrap: wrap;
  }
  .card-actions .btn { padding: 4px 10px; font-size: 11px; }
  .btn-launch { background: #1a3d1a; border-color: #2d4a2d; color: #4ade80; }
  .btn-launch:hover { background: #2d4a2d; }
  .btn-danger { background: #3b1f1f; border-color: #5c2d2d; color: #f87171; }
  .btn-danger:hover { background: #5c2d2d; }
  .card-detail { margin-top: 8px; font-size: 11px; color: #8b949e; line-height: 1.5; }
  .card-criteria { margin-top: 6px; }
  .criterion { font-size: 11px; padding: 2px 0; color: #8b949e; display: flex; gap: 5px; }
  .criterion.passed { color: #3fb950; }
  .phase-select {
    background: #0d1117; border: 1px solid #30363d; border-radius: 4px;
    color: #c9d1d9; font-size: 11px; padding: 3px 6px; font-family: inherit;
  }

  /* --- Empty --- */
  .empty-state { font-size: 11px; color: #484f58; padding: 12px; text-align: center; font-style: italic; }

  /* --- Modals --- */
  .modal-overlay {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6); z-index: 100; justify-content: center; align-items: center;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: #161b22; border: 1px solid #30363d; border-radius: 10px;
    padding: 20px; width: 440px; max-width: 90vw; max-height: 80vh; overflow-y: auto;
  }
  .modal h2 { font-size: 15px; color: #e6edf3; margin-bottom: 14px; }
  .modal label { display: block; font-size: 12px; color: #8b949e; margin: 10px 0 4px; }
  .modal input, .modal textarea, .modal select {
    width: 100%; background: #0d1117; border: 1px solid #30363d; border-radius: 6px;
    padding: 8px 10px; color: #c9d1d9; font-size: 12px; font-family: inherit; outline: none;
  }
  .modal input:focus, .modal textarea:focus, .modal select:focus { border-color: #58a6ff; }
  .modal textarea { resize: vertical; min-height: 60px; }
  .modal-actions { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }

  /* 6a: Command Palette */
  #cmd-palette-overlay { display:none; position:fixed; inset:0; background:rgba(1,4,9,0.8); z-index:1000; align-items:flex-start; justify-content:center; padding-top:15vh; }
  #cmd-palette-overlay.active { display:flex; }
  #cmd-palette { background:#161b22; border:1px solid #30363d; border-radius:10px; width:520px; max-width:90vw; box-shadow:0 16px 48px rgba(0,0,0,0.6); overflow:hidden; }
  #cmd-input { width:100%; background:#0d1117; border:none; border-bottom:1px solid #30363d; padding:14px 16px; color:#c9d1d9; font-size:14px; font-family:inherit; outline:none; }
  #cmd-results { max-height:320px; overflow-y:auto; }
  .cmd-item { padding:10px 16px; cursor:pointer; display:flex; align-items:center; gap:10px; font-size:12px; color:#8b949e; }
  .cmd-item.selected, .cmd-item:hover { background:#1c2128; color:#c9d1d9; }
  .cmd-item .cmd-icon { font-size:14px; width:20px; text-align:center; flex-shrink:0; }
  .cmd-item .cmd-label { flex:1; color:#c9d1d9; }
  .cmd-item .cmd-badge { font-size:10px; padding:2px 6px; border-radius:4px; background:#21262d; }
  .cmd-empty { padding:20px; text-align:center; color:#484f58; font-size:12px; }

  /* 6b: Card keyboard focus */
  .work-card.kb-focused { outline:2px solid #58a6ff; outline-offset:2px; }

  /* 6d: Focus Mode */
  body.focus-mode .section-header { opacity:0.4; }
  body.focus-mode .work-card:not(.focus-active) { opacity:0.15; filter:grayscale(1); pointer-events:none; }
  body.focus-mode .work-card.focus-active { opacity:1; filter:none; pointer-events:auto; }
  #focus-banner { display:none; position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#1c6939; color:#4ade80; font-size:12px; padding:8px 16px; border-radius:20px; border:1px solid #2ea043; z-index:99; }
  body.focus-mode #focus-banner { display:block; }

  /* 6e: Smart Suggestions */
  .suggested-strip { display:flex; gap:8px; padding:8px 16px; background:#0d1117; border-bottom:1px solid #21262d; flex-wrap:wrap; align-items:center; }
  .suggested-label { font-size:10px; color:#484f58; text-transform:uppercase; letter-spacing:0.5px; margin-right:4px; }
  .suggested-pill { padding:4px 10px; background:#1c2128; border:1px solid #388bfd44; border-radius:12px; font-size:11px; color:#58a6ff; cursor:pointer; transition:background 0.1s; white-space:nowrap; }
  .suggested-pill:hover { background:#21262d; }
</style>
</head>
<body>

<header>
  <h1>PAI Board</h1>
  <div class="header-stats" id="stats"></div>
  <div class="header-actions">
    <input type="text" class="search-box" id="search" placeholder="Filter... (/)">
    <button class="btn btn-primary" onclick="showNewTaskModal()">+ New Task</button>
  </div>
</header>

<!-- 6a: Command Palette -->
<div id="cmd-palette-overlay">
  <div id="cmd-palette">
    <input id="cmd-input" placeholder="Search tasks, sessions, actions… (⌘K)" autocomplete="off" oninput="cmdSearch(this.value)" onkeydown="cmdKey(event)">
    <div id="cmd-results"></div>
  </div>
</div>

<!-- 6d: Focus Mode Banner -->
<div id="focus-banner">Focus Mode — press F to exit</div>

<!-- 6e: Smart Suggestions -->
<div id="suggested-strip" class="suggested-strip" style="display:none"></div>

<div class="dashboard" id="board"></div>

<!-- New Task Modal -->
<div class="modal-overlay" id="newTaskModal">
  <div class="modal">
    <h2>New Task</h2>
    <label>Title</label>
    <input type="text" id="taskTitle" placeholder="Task description">
    <label>Description</label>
    <textarea id="taskDesc" placeholder="Context for the task..."></textarea>
    <label>Effort</label>
    <select id="taskEffort">
      <option value="standard">Standard</option>
      <option value="extended">Extended</option>
      <option value="advanced">Advanced</option>
      <option value="deep">Deep</option>
    </select>
    <label>Mode</label>
    <select id="taskMode">
      <option value="interactive">Interactive</option>
      <option value="autonomous">Autonomous</option>
    </select>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('newTaskModal')">Cancel</button>
      <button class="btn btn-primary" onclick="createTask()">Create</button>
    </div>
  </div>
</div>

<script>
// --- State ---
let allItems = [];
let archivedItems = [];
let libraryItems = [];
let sessionItems = [];
let githubItems = [];
let processes = {};
let searchQuery = '';
let expandedSlug = null;

// Collapsed state (persisted in localStorage)
let collapsed = JSON.parse(localStorage.getItem('pai-board-collapsed') || '{}');
function isCollapsed(id) { return collapsed[id] === true; }
function toggleCollapse(id) {
  collapsed[id] = !collapsed[id];
  localStorage.setItem('pai-board-collapsed', JSON.stringify(collapsed));
  renderBoard();
}

// --- Utils ---
function relativeTime(dateStr) {
  if (!dateStr) return '';
  const diff = Date.now() - new Date(dateStr).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  const days = Math.floor(hrs / 24);
  return days + 'd ago';
}

function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function matchesSearch(text) {
  if (!searchQuery) return true;
  return (text || '').toLowerCase().includes(searchQuery.toLowerCase());
}

// --- Render ---
function renderBoard() {
  const board = document.getElementById('board');
  const stats = document.getElementById('stats');

  const active = allItems.filter(i => !['complete','observe'].includes(i.phase)).length;
  const sessActive = sessionItems.filter(s => s.isActive).length;
  stats.textContent = sessActive + ' sessions | ' + active + ' active | ' + allItems.length + ' total';

  renderSuggestions();

  let leftHtml = '<div class="panel"><div class="panel-title">Active Work</div>';
  let rightHtml = '<div class="panel"><div class="panel-title">Reference</div>';

  // LEFT: Sessions
  const sessFiltered = sessionItems.filter(s => s.isActive && matchesSearch(s.task));
  leftHtml += renderSection('sessions', 'Sessions', sessFiltered.length, isCollapsed('sessions'),
    sessFiltered.length === 0 ? '<div class="empty-state">No active sessions</div>' :
    sessFiltered.map(s => renderSessionCard(s)).join(''));

  // LEFT: In Progress
  const inProgress = allItems.filter(i => ['think','plan','build','execute'].includes(i.phase) && matchesSearch(i.task));
  leftHtml += renderSection('progress', 'In Progress', inProgress.length, isCollapsed('progress'),
    inProgress.length === 0 ? '<div class="empty-state">Nothing in progress</div>' :
    inProgress.map(i => renderWorkCard(i)).join(''));

  // LEFT: Backlog
  const backlog = allItems.filter(i => i.phase === 'observe' && matchesSearch(i.task));
  leftHtml += renderSection('backlog', 'Backlog', backlog.length, isCollapsed('backlog'),
    backlog.length === 0 ? '<div class="empty-state">Backlog empty</div>' :
    backlog.map(i => renderWorkCard(i)).join(''));

  // RIGHT: My PRs
  const myPRs = githubItems.filter(g => g.type === 'pr' && matchesSearch(g.title));
  rightHtml += renderSection('prs', 'My PRs', myPRs.length, isCollapsed('prs'),
    myPRs.length === 0 ? '<div class="empty-state">No open PRs</div>' :
    myPRs.map(renderGitHubCard).join(''));

  // RIGHT: Active Issues (assigned + recently commented) — grouped by repo
  const activeIssues = githubItems.filter(g => g.type === 'issue' && matchesSearch(g.title));
  rightHtml += renderSection('issues', 'Issues', activeIssues.length, isCollapsed('issues'),
    renderIssuesGrouped(activeIssues));

  // RIGHT: Done
  const done = allItems.filter(i => i.phase === 'complete' && matchesSearch(i.task));
  rightHtml += renderSection('done', 'Done', done.length, isCollapsed('done') !== false ? true : false,
    done.map(i => renderWorkCard(i)).join(''));

  // RIGHT: Library
  const lib = libraryItems.filter(i => matchesSearch(i.name || i.description));
  rightHtml += renderSection('library', 'Library', lib.length, isCollapsed('library') !== false ? true : false,
    lib.map(renderLibraryCard).join(''));

  leftHtml += '</div>';
  rightHtml += '</div>';
  board.innerHTML = leftHtml + rightHtml;
}

function renderSection(id, label, count, isCollapsedState, bodyHtml) {
  const cls = isCollapsedState ? ' collapsed' : '';
  const arrow = isCollapsedState ? '&#x25B6;' : '&#x25BC;';
  return '<div class="section sec-' + id + cls + '">' +
    '<div class="section-header" onclick="toggleCollapse(\'' + id + '\')">' +
      '<span class="arrow">' + arrow + '</span> ' + label +
      ' <span class="count">' + count + '</span>' +
    '</div>' +
    '<div class="section-body">' + bodyHtml + '</div>' +
  '</div>';
}

function formatDuration(ms) {
  if (!ms || ms < 0) return null;
  const mins = Math.floor(ms / 60000);
  if (mins < 1) return '<1m';
  if (mins < 60) return mins + 'm';
  const hrs = Math.floor(mins / 60);
  const rem = mins % 60;
  return hrs + 'h' + (rem > 0 ? ' ' + rem + 'm' : '');
}

function renderTimeline(events) {
  if (!events || events.length === 0) return '';
  const phaseColors = {
    observe: '#484f58', think: '#a78bfa', plan: '#58a6ff', build: '#22d3ee',
    execute: '#4ade80', verify: '#fbbf24', learn: '#f97316', complete: '#3fb950', native: '#484f58',
  };
  // Build segments from phase_change events
  const segments = [];
  let sessionStart = null;
  let sessionEnd = null;
  let currentPhase = null;
  let phaseStart = null;
  for (const ev of events) {
    if (ev.type === 'session_start') { sessionStart = new Date(ev.at).getTime(); phaseStart = sessionStart; currentPhase = 'observe'; }
    else if (ev.type === 'phase_change') {
      if (phaseStart && currentPhase) segments.push({ phase: currentPhase, start: phaseStart, end: new Date(ev.at).getTime() });
      currentPhase = ev.to || currentPhase;
      phaseStart = new Date(ev.at).getTime();
    }
    else if (ev.type === 'session_end') { sessionEnd = new Date(ev.at).getTime(); }
  }
  if (phaseStart && currentPhase) segments.push({ phase: currentPhase, start: phaseStart, end: sessionEnd || Date.now() });
  if (segments.length === 0) return '';
  const total = (sessionEnd || Date.now()) - (sessionStart || segments[0].start);
  if (total <= 0) return '';
  let barHtml = '<div class="timeline-bar">';
  for (const seg of segments) {
    const left = ((seg.start - (sessionStart || segments[0].start)) / total * 100).toFixed(1);
    const width = Math.max(2, ((seg.end - seg.start) / total * 100)).toFixed(1);
    const color = phaseColors[seg.phase] || '#484f58';
    const dur = formatDuration(seg.end - seg.start);
    barHtml += `<div class="timeline-segment" style="left:${left}%;width:${width}%;background:${color}" title="${seg.phase}${dur ? ' — ' + dur : ''}"></div>`;
  }
  barHtml += '</div>';
  // Show criterion_pass count
  const passed = events.filter(e => e.type === 'criterion_pass').length;
  const eventChips = passed > 0 ? `<div class="timeline-events"><span class="timeline-event">✓ ${passed} criteria</span></div>` : '';
  return '<div class="timeline"><div class="timeline-label">Timeline</div>' + barHtml + eventChips + '</div>';
}

function renderSessionCard(sess) {
  const displayTitle = sess.sessionName || sess.task;
  const lc = sess.lifecycle || {};
  const durationMs = lc.durationMs || (lc.endedAt ? new Date(lc.endedAt).getTime() - new Date(lc.startedAt || sess.startedAt).getTime() : null);
  const dur = durationMs ? formatDuration(durationMs) : null;
  const exitStatus = lc.exitStatus;
  const exitBadge = exitStatus ? `<span class="exit-badge exit-${exitStatus}">${exitStatus}</span>` : '';
  const durHtml = dur ? `<span class="session-duration${sess.isActive ? ' active' : ''}">${dur}</span>` : '';
  return '<div class="card card-session">' +
    '<div class="card-title">' + esc(displayTitle) + '</div>' +
    '<div class="card-meta">' +
      '<span class="badge badge-active">active</span>' +
      '<span class="badge badge-phase">' + esc(sess.phase) + '</span>' +
      durHtml + exitBadge +
    '</div>' +
    '<div class="card-time">' + relativeTime(sess.startedAt) + '</div>' +
  '</div>';
}

function renderWorkCard(item) {
  const pct = item.total > 0 ? Math.round(item.passed / item.total * 100) : 0;
  const isExpanded = expandedSlug === item.slug;
  const expandedClass = isExpanded ? ' card-expanded' : '';
  const phases = ['observe','think','plan','build','execute','verify','learn','complete'];

  let html = '<div class="work-card card' + expandedClass + '" data-slug="' + esc(item.slug) + '" onclick="toggleExpand(\'' + esc(item.slug) + '\')">' +
    '<div class="card-title">' + esc(item.task) + '</div>' +
    '<div class="card-meta">' +
      '<span class="badge badge-effort">' + item.effort + '</span>' +
      '<span class="badge badge-phase">' + item.phase + '</span>' +
      (item.total > 0 ? '<span class="badge" style="background:#21262d;color:#8b949e">' + item.passed + '/' + item.total + '</span>' : '') +
    '</div>' +
    (item.total > 0 ? '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div>' : '') +
    '<div class="card-time">' + relativeTime(item.updated) + '</div>';

  if (isExpanded) {
    // Criteria
    if (item.criteria && item.criteria.length > 0) {
      html += '<div class="card-criteria">';
      for (const c of item.criteria.slice(0, 10)) {
        html += '<div class="criterion ' + (c.passed ? 'passed' : '') + '">' +
          '<span>' + (c.passed ? '&#x2713;' : '&#x25CB;') + '</span>' +
          '<span>' + esc(c.id + ': ' + c.text) + '</span></div>';
      }
      if (item.criteria.length > 10) {
        html += '<div class="criterion">... +' + (item.criteria.length - 10) + ' more</div>';
      }
      html += '</div>';
    }

    // Timeline (from session events if bound to a session)
    const boundSession = sessionItems.find(s => s.taskSlug === item.slug || s.slug === item.slug);
    if (boundSession && boundSession.events) {
      html += renderTimeline(boundSession.events);
    }

    // Actions
    html += '<div class="card-actions" onclick="event.stopPropagation()">';
    // Launch button
    if (item.phase !== 'complete') {
      html += '<button class="btn btn-launch" onclick="launchSession(\'' + esc(item.slug) + '\')">Launch Session</button>';
    }
    // Phase selector
    html += '<select class="phase-select" onchange="changePhase(\'' + esc(item.slug) + '\', this.value)">' +
      '<option value="">Move to...</option>' +
      phases.map(function(p) { return '<option value="' + p + '"' + (p === item.phase ? ' disabled' : '') + '>' + p + '</option>'; }).join('') +
    '</select>';
    // Archive
    html += '<button class="btn btn-danger" onclick="archiveItem(\'' + esc(item.slug) + '\')">Archive</button>';
    html += '</div>';
  }

  html += '</div>';
  return html;
}

function toggleExpand(slug) {
  expandedSlug = expandedSlug === slug ? null : slug;
  renderBoard();
}

async function launchSession(slug) {
  const res = await fetch('/api/task/' + encodeURIComponent(slug) + '/launch', { method: 'POST' });
  const data = await res.json();
  if (data.ok) {
    fetchAll();
  } else {
    alert('Failed to launch: ' + (data.error || 'unknown'));
  }
}

async function changePhase(slug, phase) {
  if (!phase) return;
  await fetch('/api/task/' + encodeURIComponent(slug) + '/phase', {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ phase }),
  });
  fetchAll();
}

async function archiveItem(slug) {
  await fetch('/api/task/' + encodeURIComponent(slug) + '/archive', { method: 'POST' });
  fetchAll();
}

function getAgeBadge(dateStr) {
  if (!dateStr) return '';
  const days = Math.floor((Date.now() - new Date(dateStr).getTime()) / 86400000);
  if (days >= 7) return '<span class="badge badge-stale">' + days + 'd stale</span>';
  if (days >= 3) return '<span class="badge badge-aging">' + days + 'd</span>';
  return '';
}

function renderGitHubCard(item) {
  const repoShort = item.repo.split('/').pop() || item.repo;
  const badgeClass = item.type === 'pr' ? 'badge-pr' : (item.state === 'commented' ? 'badge-watching' : 'badge-issue');
  const stateLabel = item.state === 'commented' ? 'commented' : item.type === 'pr' ? 'PR' : 'assigned';
  const ageBadge = getAgeBadge(item.updatedAt);
  return '<div class="card" onclick="window.open(\'' + esc(item.url) + '\',\'_blank\')">' +
    '<div class="card-title">' + esc(item.title.slice(0, 80)) + '</div>' +
    '<div class="card-meta">' +
      '<span class="badge badge-repo">' + esc(repoShort) + '</span>' +
      '<span class="badge ' + badgeClass + '">#' + item.number + ' ' + stateLabel + '</span>' +
      ageBadge +
      (item.labels || []).slice(0, 2).map(function(l) {
        return '<span class="badge badge-label">' + esc(l) + '</span>';
      }).join('') +
    '</div>' +
    '<div class="card-time">' + relativeTime(item.updatedAt) + '</div>' +
  '</div>';
}

function renderIssuesGrouped(issues) {
  if (issues.length === 0) return '<div class="empty-state">No active issues</div>';
  // Group by repo
  const groups = {};
  for (const issue of issues) {
    const repo = issue.repo.split('/').pop() || issue.repo;
    if (!groups[repo]) groups[repo] = [];
    groups[repo].push(issue);
  }
  // Sort groups by count descending
  const sorted = Object.entries(groups).sort((a, b) => b[1].length - a[1].length);
  return sorted.map(function([repo, items]) {
    const groupId = 'gh-' + repo;
    const isGroupCollapsed = collapsed[groupId];
    const arrow = isGroupCollapsed ? '&#x25B6;' : '&#x25BC;';
    return '<div class="repo-group">' +
      '<div class="repo-group-header" onclick="event.stopPropagation();toggleCollapse(\'' + groupId + '\')">' +
        '<span class="arrow">' + arrow + '</span> ' + esc(repo) + ' (' + items.length + ')' +
      '</div>' +
      (isGroupCollapsed ? '' : items.map(renderGitHubCard).join('')) +
    '</div>';
  }).join('');
}

function renderLibraryCard(item) {
  return '<div class="card card-library">' +
    '<div class="card-title">' + esc(item.name) + '</div>' +
    '<div class="card-desc">' + esc(item.description) + '</div>' +
    '<div class="card-meta">' +
      (item.tags || []).map(function(t) { return '<span class="badge badge-phase">' + esc(t) + '</span>'; }).join('') +
    '</div>' +
  '</div>';
}

// --- API ---
async function fetchAll() {
  try {
    const [workRes, libRes, ghRes] = await Promise.all([
      fetch('/api/work'), fetch('/api/library'), fetch('/api/github')
    ]);
    const work = await workRes.json();
    allItems = work.items || [];
    archivedItems = work.archived || [];
    sessionItems = work.sessions || [];
    processes = work.processes || {};
    libraryItems = await libRes.json();
    githubItems = await ghRes.json();
    renderBoard();
  } catch (e) {
    document.getElementById('board').innerHTML =
      '<div class="empty-state" style="padding:40px;font-size:14px;color:#f87171;">Error: ' + e.message + '</div>';
  }
}

async function createTask() {
  const title = document.getElementById('taskTitle').value.trim();
  if (!title) return;
  const desc = document.getElementById('taskDesc').value.trim();
  const effort = document.getElementById('taskEffort').value;
  const mode = document.getElementById('taskMode').value;

  await fetch('/api/task', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ title, description: desc, effort, mode }),
  });

  closeModal('newTaskModal');
  document.getElementById('taskTitle').value = '';
  document.getElementById('taskDesc').value = '';
  fetchAll();
}

// --- UI ---
function showNewTaskModal() {
  document.getElementById('newTaskModal').className = 'modal-overlay active';
  setTimeout(() => document.getElementById('taskTitle').focus(), 100);
}

function closeModal(id) {
  document.getElementById(id).className = 'modal-overlay';
}

document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) el.className = 'modal-overlay'; });
});

// --- Search ---
document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value;
  renderBoard();
});

// --- 6a: Command Palette ---
let cmdSelectedIdx = 0;
let cmdItems = [];

function openCmdPalette() {
  document.getElementById('cmd-palette-overlay').classList.add('active');
  const input = document.getElementById('cmd-input');
  input.value = '';
  cmdSearch('');
  setTimeout(() => input.focus(), 10);
}

function closeCmdPalette() {
  document.getElementById('cmd-palette-overlay').classList.remove('active');
}

function cmdSearch(query) {
  const q = query.toLowerCase().trim();
  cmdItems = [];

  // Tasks
  allItems.filter(t => !q || t.task?.toLowerCase().includes(q) || t.slug?.toLowerCase().includes(q)).slice(0, 6).forEach(t => {
    cmdItems.push({ icon: '📋', label: t.task || t.slug, badge: t.phase || '', action: () => { toggleExpand(t.slug); closeCmdPalette(); } });
  });

  // Sessions
  sessionItems.filter(s => !q || s.name?.toLowerCase().includes(q)).slice(0, 4).forEach(s => {
    cmdItems.push({ icon: '💬', label: s.name || s.id, badge: 'session', action: () => closeCmdPalette() });
  });

  // Actions
  const actions = [
    { icon: '＋', label: 'New Task', badge: 'N', action: () => { closeCmdPalette(); showNewTaskModal(); } },
    { icon: '🔄', label: 'Refresh Board', badge: 'R', action: () => { closeCmdPalette(); fetchAll(); } },
    { icon: '🔭', label: 'Focus Mode', badge: 'F', action: () => { closeCmdPalette(); toggleFocusMode(); } },
  ];
  actions.filter(a => !q || a.label.toLowerCase().includes(q)).forEach(a => cmdItems.push(a));

  cmdSelectedIdx = 0;
  renderCmdResults();
}

function renderCmdResults() {
  const el = document.getElementById('cmd-results');
  if (cmdItems.length === 0) {
    el.innerHTML = '<div class="cmd-empty">No results</div>';
    return;
  }
  el.innerHTML = cmdItems.map((item, i) =>
    `<div class="cmd-item${i === cmdSelectedIdx ? ' selected' : ''}" onclick="cmdActivate(${i})">
      <span class="cmd-icon">${item.icon}</span>
      <span class="cmd-label">${item.label}</span>
      <span class="cmd-badge">${item.badge}</span>
    </div>`
  ).join('');
}

function cmdActivate(idx) {
  if (cmdItems[idx]) cmdItems[idx].action();
}

function cmdKey(e) {
  if (e.key === 'Escape') { closeCmdPalette(); return; }
  if (e.key === 'ArrowDown') { e.preventDefault(); cmdSelectedIdx = Math.min(cmdSelectedIdx + 1, cmdItems.length - 1); renderCmdResults(); }
  if (e.key === 'ArrowUp') { e.preventDefault(); cmdSelectedIdx = Math.max(cmdSelectedIdx - 1, 0); renderCmdResults(); }
  if (e.key === 'Enter') { e.preventDefault(); cmdActivate(cmdSelectedIdx); }
}

document.getElementById('cmd-palette-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('cmd-palette-overlay')) closeCmdPalette();
});

// --- 6b: Card keyboard navigation ---
let kbFocusedSlug = null;

function getVisibleCards() {
  return Array.from(document.querySelectorAll('.work-card[data-slug]'));
}

function kbFocusCard(slug) {
  document.querySelectorAll('.work-card.kb-focused').forEach(el => el.classList.remove('kb-focused'));
  kbFocusedSlug = slug;
  if (!slug) return;
  const el = document.querySelector(`.work-card[data-slug="${CSS.escape(slug)}"]`);
  if (el) { el.classList.add('kb-focused'); el.scrollIntoView({ block: 'nearest' }); }
}

function kbMove(dir) {
  const cards = getVisibleCards();
  if (!cards.length) return;
  const currentIdx = cards.findIndex(c => c.dataset.slug === kbFocusedSlug);
  let nextIdx = currentIdx === -1 ? 0 : Math.max(0, Math.min(cards.length - 1, currentIdx + dir));
  kbFocusCard(cards[nextIdx]?.dataset.slug);
}

// --- 6d: Focus Mode ---
function toggleFocusMode(slug) {
  const body = document.body;
  const isActive = body.classList.contains('focus-mode');

  document.querySelectorAll('.work-card').forEach(el => el.classList.remove('focus-active'));

  if (isActive) {
    body.classList.remove('focus-mode');
  } else {
    const targetSlug = slug || kbFocusedSlug || (allItems.find(t => t.phase === 'execute' || t.phase === 'build')?.slug);
    if (targetSlug) {
      const el = document.querySelector(`.work-card[data-slug="${CSS.escape(targetSlug)}"]`);
      if (el) el.classList.add('focus-active');
    }
    body.classList.add('focus-mode');
  }
}

// --- 6e: Smart Suggestions ---
function computeSuggestions(items) {
  const now = Date.now();
  const scored = items.map(item => {
    let score = 0;
    // Phase scoring: execute/build is most urgent
    const phaseWeight = { execute: 10, build: 8, plan: 5, think: 4, observe: 3, verify: 6, learn: 2 };
    score += phaseWeight[item.phase] || 0;
    // Recency: items updated in last 2h get a boost
    const updatedMs = item.updated ? Date.parse(item.updated) : 0;
    if (updatedMs && now - updatedMs < 2 * 3600 * 1000) score += 5;
    // Progress: near-completion items get a boost
    if (item.progress) {
      const [done, total] = item.progress.split('/').map(Number);
      if (total > 0 && done / total >= 0.7) score += 3;
    }
    return { ...item, _score: score };
  });
  return scored.sort((a, b) => b._score - a._score).slice(0, 3);
}

function renderSuggestions() {
  const strip = document.getElementById('suggested-strip');
  const active = allItems.filter(t => t.phase !== 'complete' && t.phase !== 'archive');
  if (active.length < 2) { strip.style.display = 'none'; return; }
  const suggestions = computeSuggestions(active);
  if (!suggestions.length) { strip.style.display = 'none'; return; }
  strip.style.display = 'flex';
  strip.innerHTML = '<span class="suggested-label">Suggested</span>' +
    suggestions.map(s => `<span class="suggested-pill" onclick="toggleExpand('${s.slug}')" title="${s.task || s.slug}">${(s.task || s.slug).slice(0, 32)}</span>`).join('');
}

// --- Keyboard ---
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;

  // 6a: Command Palette
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); openCmdPalette(); return; }

  if (e.key === 'n' || e.key === 'N') { e.preventDefault(); showNewTaskModal(); }
  if (e.key === '/') { e.preventDefault(); document.getElementById('search').focus(); }
  if (e.key === 'r' || e.key === 'R') { e.preventDefault(); fetchAll(); }

  // 6b: Card navigation
  if (e.key === 'j') { e.preventDefault(); kbMove(1); }
  if (e.key === 'k') { e.preventDefault(); kbMove(-1); }
  if (e.key === 'Enter' && kbFocusedSlug) { e.preventDefault(); toggleExpand(kbFocusedSlug); }

  // 6d: Focus Mode
  if (e.key === 'f' || e.key === 'F') { e.preventDefault(); toggleFocusMode(); }

  if (e.key === 'Escape') {
    closeCmdPalette();
    if (document.body.classList.contains('focus-mode')) { toggleFocusMode(); return; }
    document.querySelectorAll('.modal-overlay.active').forEach(el => el.className = 'modal-overlay');
    document.getElementById('search').blur();
    kbFocusCard(null);
  }
});

// --- SSE ---
const es = new EventSource('/api/events');
es.onmessage = () => fetchAll();
es.onerror = () => setTimeout(() => fetchAll(), 5000);

// --- Init ---
fetchAll();
</script>
